
# This sets the container image 
image:
  repository: 430695042840.dkr.ecr.us-east-1.amazonaws.com/project_a_kubernetes_backend
  pullPolicy: IfNotPresent
  tag: sha-0c464b9
nameOverride: "backend"
fullnameOverride: "project-a-helm-backend"

serviceAccount:
  create: true 
  annotations: 
    eks.amazonaws.com/role-arn: arn:aws:iam::430695042840:role/kube-SA-OIDC

# This is for setting Kubernetes Annotations to a Pod.
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
podLabels: {}

#defining pod level security... least privilledge and blast radius control
securityContext: 
   capabilities:
     drop:
     - ALL
   readOnlyRootFilesystem: true
   runAsNonRoot: true
   runAsUser: 400

# This is for setting up a service
service:
  type: ClusterIP
  port: 8000

resources: 
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

# This is to setup the startup,liveness and readiness probes
startupProbe:
  httpGet:
    path: /health/ready
    port: http
  failureThreshold: 30
  initialDelaySeconds: 10
  timeoutSeconds: 2
  periodSeconds: 5
livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 2
readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 20
  timeoutSeconds: 2
  periodSeconds: 5
# This section is for setting up autoscaling 
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70 #We scale pod when the cpu resource of the pods get to 70%
  targetMemoryUtilizationPercentage: 70 #we scale pods when the memory usage gets to 70% 
network:
  enabled: true 
  backendName: "" 
  frontendName: ""
  port: 8080
# Additional volumes on the output Deployment definition.
volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true
