apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: project-a-backend
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Project-A-Kubernetes/-Project_A_helm_chart_backend.git
    targetRevision: main
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
    syncOptions:
      - CreateNamespace=true 

#im using Github app for short live repo access with limited permission to read only....