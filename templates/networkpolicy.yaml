{{- if .Values.network.enabled}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "project_A_helm_backend.fullname" . }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.network.backendName}}
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: {{ .Values.network.frontendName}}
    ports:
    - protocol: TCP
      port: {{ .Values.network.port}}
  {{- end }}